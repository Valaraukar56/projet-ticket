services:
  # Application PHP/Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - storage-data:/var/www/html/storage/app
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=ticket_db
      - DB_USERNAME=ticket_user
      - DB_PASSWORD=ticket_password
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DATABASE=ticket_logs
      - MONGO_USERNAME=mongo_user
      - MONGO_PASSWORD=mongo_password
    networks:
      - ticket-network
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started

  # Base de données MySQL
  mysql:
    image: mysql:8.0
    container_name: ticket-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ticket_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: ticket_user
      MYSQL_PASSWORD: ticket_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - ticket-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Base de données MongoDB (pour les logs)
  mongodb:
    image: mongo:7
    container_name: ticket-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
      MONGO_INITDB_DATABASE: ticket_logs
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - ticket-network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ticket-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root_password
    networks:
      - ticket-network
    depends_on:
      mysql:
        condition: service_healthy

  # GLPI
  glpi:
    image: diouxx/glpi:latest
    container_name: ticket-glpi
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - glpi-data:/var/www/html
    environment:
      TIMEZONE: Europe/Paris
    networks:
      - ticket-network
    depends_on:
      glpi-db:
        condition: service_healthy

  # Base de données MariaDB pour GLPI
  glpi-db:
    image: mariadb:10.11
    container_name: ticket-glpi-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: glpi_root_password
      MARIADB_DATABASE: glpi
      MARIADB_USER: glpi_user
      MARIADB_PASSWORD: glpi_password
    volumes:
      - glpi-db-data:/var/lib/mysql
    networks:
      - ticket-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  ticket-network:
    driver: bridge

volumes:
  mysql-data:
  mongodb-data:
  storage-data:
  glpi-data:
  glpi-db-data:
