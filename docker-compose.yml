services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    networks:
      - ticket-network
    depends_on:
      - mysql
      - mongodb

  mysql:
    image: mysql:8.0
    container_name: ticket-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ticket_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ticket_user
      MYSQL_PASSWORD: ticket_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - ticket-network

  mongodb:
    image: mongo:7
    container_name: ticket-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
      MONGO_INITDB_DATABASE: ticket_logs
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - ticket-network

  node:
    image: node:20-alpine
    container_name: ticket-node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    networks:
      - ticket-network

networks:
  ticket-network:
    driver: bridge

volumes:
  mysql-data:
  mongodb-data:
