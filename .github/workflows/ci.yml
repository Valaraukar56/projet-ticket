name: CI/CD - Projet Ticket

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, sqlite3, mbstring, zip

      - name: Installer les dépendances Composer
        run: composer install --no-interaction

      - name: Copier le .env
        run: cp .env.example .env

      - name: Générer la clé Laravel
        run: php artisan key:generate

      - name: Créer la base SQLite
        run: touch database/database.sqlite

      - name: Lancer les migrations
        run: php artisan migrate --force

      - name: Lancer les tests PHPUnit
        run: php artisan test

      - name: Installer Node et builder le frontend
        run: |
          npm install
          npm run build